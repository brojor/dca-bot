stages:
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  DEPLOY_HOST: "192.168.0.64"
  DEPLOY_USER: "ubuntu"
  APP_DIR: "/opt/apps/dca-bot"
  REGISTRY_HOST: "registry.gitlab.brojor.me"
  REGISTRY_LAN_IP: "192.168.0.63"

build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  before_script:
    - IMAGE="${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$IMAGE" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$IMAGE"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:
  stage: deploy
  image: alpine:3.21
  needs:
    - build
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - |
      set -e
      if [ -n "$SSH_PRIVATE_KEY_B64" ]; then
        key_src="$SSH_PRIVATE_KEY_B64"
      elif [ -n "$SSH_PRIVATE_KEY" ]; then
        key_src="$SSH_PRIVATE_KEY"
      else
        echo "Missing SSH key variable (SSH_PRIVATE_KEY_B64 or SSH_PRIVATE_KEY)"
        exit 1
      fi

      tmp_in="$(mktemp)"
      tmp_decoded="$(mktemp)"
      cleanup() { rm -f "$tmp_in" "$tmp_decoded"; }
      trap cleanup EXIT

      if [ -f "$key_src" ]; then
        cp "$key_src" "$tmp_in"
      else
        printf '%s\n' "$key_src" > "$tmp_in"
      fi

      tr -d '\r' < "$tmp_in" > ~/.ssh/id_ed25519

      if ! ssh-keygen -l -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
        if tr -d '\r\n' < "$tmp_in" | base64 -d > "$tmp_decoded" 2>/dev/null; then
          tr -d '\r' < "$tmp_decoded" > ~/.ssh/id_ed25519
        fi
      fi

      if ! ssh-keygen -l -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
        echo "SSH private key is invalid (neither raw key nor base64-encoded raw key)."
        exit 1
      fi
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - IMAGE="$CI_REGISTRY_IMAGE:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$APP_DIR'"
    - scp compose.yaml "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/docker-compose.yml"
    - printf 'KEY_NAME=%s\nPRIVATE_KEY=%s\nIMAGE=%s\n' "$DCA_BOT_KEY_NAME" "$DCA_BOT_PRIVATE_KEY" "$IMAGE" > /tmp/dca-bot.env
    - scp /tmp/dca-bot.env "$DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/.env"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "if ! grep -qE '^[[:space:]]*$REGISTRY_LAN_IP[[:space:]]+$REGISTRY_HOST([[:space:]]|$)' /etc/hosts; then echo '$REGISTRY_LAN_IP $REGISTRY_HOST' | sudo tee -a /etc/hosts >/dev/null; fi"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "echo '$CI_REGISTRY_PASSWORD' | docker login '$CI_REGISTRY' -u '$CI_REGISTRY_USER' --password-stdin"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$APP_DIR' && docker compose -f docker-compose.yml up -d --pull always"
  environment:
    name: production
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
